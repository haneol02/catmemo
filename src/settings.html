<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>설정</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:340px; height:420px;
      background:transparent;
      overflow:hidden;
      font-family:'Segoe UI',system-ui,sans-serif;
    }
    .panel {
      width:100%; height:100%;
      background:rgba(255,255,255,.97);
      border-radius:14px;
      box-shadow:0 6px 28px rgba(0,0,0,.18);
      display:flex; flex-direction:column;
      overflow:hidden;
    }
    /* ── header ─────────────────────────────────── */
    .header {
      display:flex; align-items:center;
      padding:0 14px; height:48px;
      border-bottom:1px solid #eee;
      cursor:default; flex-shrink:0;
    }
    .header h2 { font:600 14px/1 inherit; color:#222; flex:1; }
    .header-btn {
      width:28px; height:28px; border:none; background:transparent;
      border-radius:7px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background .15s; color:#555;
    }
    .header-btn svg { width:15px; height:15px; }
    .header-btn:hover { background:rgba(0,0,0,.07); }
    /* ── body ────────────────────────────────────── */
    .body { flex:1; overflow-y:auto; padding:14px; }
    .body::-webkit-scrollbar { width:5px; }
    .body::-webkit-scrollbar-thumb { background:#ddd; border-radius:3px; }
    .section-label {
      font:600 11px/1 inherit; color:#999;
      letter-spacing:.04em; text-transform:uppercase;
      margin-bottom:10px; margin-top:4px;
    }
    /* ── breed grid ──────────────────────────────── */
    .breed-grid {
      display:grid; grid-template-columns:repeat(5,1fr);
      gap:8px; margin-bottom:20px;
    }
    .breed-card {
      display:flex; flex-direction:column; align-items:center;
      gap:5px; padding:8px 4px 7px;
      border-radius:10px; cursor:pointer;
      border:2px solid transparent;
      transition:border-color .15s, box-shadow .15s;
      background:#f9f9f9;
    }
    .breed-card:hover { box-shadow:0 2px 8px rgba(0,0,0,.1); }
    .breed-card.selected {
      border-color:#f59e0b;
      background:#fffbeb;
    }
    .breed-icon { font-size:28px; line-height:1; }
    .breed-svg { width:40px; height:40px; }
    .breed-name { font:500 10px/1 inherit; color:#555; text-align:center; }
    /* ── color section ───────────────────────────── */
    .color-section { margin-bottom:20px; }
    .color-row {
      display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    }
    .color-swatch {
      width:26px; height:26px; border-radius:50%;
      cursor:pointer; border:2.5px solid transparent;
      transition:transform .15s, border-color .15s;
    }
    .color-swatch:hover { transform:scale(1.15); }
    .color-swatch.selected { border-color:#374151; }
    /* ── info ────────────────────────────────────── */
    .info-box {
      background:#f3f4f6; border-radius:8px; padding:10px 12px;
      font:12px/1.6 inherit; color:#666;
    }
    /* ── footer ──────────────────────────────────── */
    .footer {
      padding:8px 14px 12px; border-top:1px solid #eee; flex-shrink:0;
    }
    .save-btn {
      width:100%; padding:9px; border:none; border-radius:9px;
      background:#fbbf24; color:#333; font:600 13px/1 inherit;
      cursor:pointer; transition:background .15s;
    }
    .save-btn:hover { background:#f59e0b; }
    .saved-msg {
      text-align:center; font:12px inherit; color:#16a34a;
      margin-top:5px; height:14px; transition:opacity .3s;
    }
  </style>
</head>
<body>
<div class="panel">
  <!-- header -->
  <div class="header" id="header">
    <h2>
      <svg style="width:14px;height:14px;vertical-align:-2px;margin-right:5px;opacity:.7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>설정</h2>
    <button class="header-btn" id="btn-close" title="닫기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- body -->
  <div class="body">
    <div class="section-label">고양이 품종</div>
    <div class="breed-grid" id="breed-grid"></div>

    <div class="section-label">기본 메모 색상</div>
    <div class="color-section">
      <div class="color-row" id="color-row"></div>
    </div>

    <div class="info-box">
      품종을 바꾸면 화면의 고양이가 즉시 바뀝니다.<br>
      기본 색상은 새로 만드는 메모에 적용돼요
    </div>
  </div>

  <!-- footer -->
  <div class="footer">
    <button class="save-btn" id="save-btn">저장</button>
    <div class="saved-msg" id="saved-msg"></div>
  </div>
</div>

<script type="module">
import { getSettings, saveSettings } from './store.js';
import { BREEDS, applyBreed }         from './breeds.js';

const emit   = (...a) => window.__TAURI__.event.emit(...a);
const appWin = window.__TAURI__.window.getCurrentWindow();

const COLORS = [
  '#fef9c3','#d1fae5','#dbeafe','#fce7f3','#ede9fe','#f3f4f6',
];

let selBreed = 'orange';
let selColor = '#fef9c3';

// ── drag header ───────────────────────────────────────────────────────────────
document.getElementById('header').addEventListener('mousedown', async e => {
  if (e.target.tagName === 'BUTTON') return;
  await appWin.startDragging();
});

// ── close ─────────────────────────────────────────────────────────────────────
document.getElementById('btn-close').addEventListener('click', () => appWin.hide());

// ── build breed cards ────────────────────────────────────────────────────────
async function buildBreedGrid() {
  const grid = document.getElementById('breed-grid');
  grid.innerHTML = '';

  // Load the cat SVG once for mini previews
  let svgText = '';
  try { svgText = await fetch('./cat.svg').then(r => r.text()); } catch {}

  for (const [key, info] of Object.entries(BREEDS)) {
    const card = document.createElement('div');
    card.className = 'breed-card' + (key === selBreed ? ' selected' : '');
    card.dataset.breed = key;

    let preview = '';
    if (svgText) {
      const colored = applyBreed(svgText, key);
      // Scale to small thumbnail via viewBox only
      const mini = colored
        .replace(/width="[^"]*"/, 'class="breed-svg"')
        .replace(/height="[^"]*"/, '');
      preview = mini;
    } else {
      preview = `<div class="breed-icon">${info.emoji}</div>`;
    }

    card.innerHTML = `
      ${preview}
      <div class="breed-name">${info.name.replace('고양이','').trim()}</div>`;

    card.addEventListener('click', () => {
      selBreed = key;
      grid.querySelectorAll('.breed-card').forEach(c =>
        c.classList.toggle('selected', c.dataset.breed === key));
    });

    grid.appendChild(card);
  }
}

// ── build color swatches ──────────────────────────────────────────────────────
function buildColorRow() {
  const row = document.getElementById('color-row');
  row.innerHTML = '';
  COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (c === selColor ? ' selected' : '');
    s.style.background = c;
    s.title = c;
    s.addEventListener('click', () => {
      selColor = c;
      row.querySelectorAll('.color-swatch').forEach(x =>
        x.classList.toggle('selected', x.style.background === c ||
          x.style.background === hexToRgb(c)));
    });
    row.appendChild(s);
  });
}

function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

// ── save ──────────────────────────────────────────────────────────────────────
document.getElementById('save-btn').addEventListener('click', async () => {
  await saveSettings({ breed: selBreed, defaultColor: selColor });
  await emit('breed-changed', { breed: selBreed });
  const msg = document.getElementById('saved-msg');
  msg.textContent = '저장됐어요! 골골골…';
  setTimeout(() => { msg.textContent = ''; }, 2000);
});

// ── boot ──────────────────────────────────────────────────────────────────────
const s = await getSettings();
selBreed = s.breed || 'orange';
selColor = s.defaultColor || '#fef9c3';

buildColorRow();
await buildBreedGrid();
</script>
</body>
</html>
