<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title></title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { background:transparent; width:170px; overflow:hidden; user-select:none; }
    .menu {
      background:rgba(28,28,30,.97);
      border:1px solid rgba(255,255,255,.1);
      border-radius:11px;
      padding:5px 0;
      width:170px;
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      box-shadow:0 8px 32px rgba(0,0,0,.55);
    }
    .section-label {
      font:500 10px/1 'Segoe UI',sans-serif;
      color:rgba(255,255,255,.3);
      padding:6px 13px 3px;
      letter-spacing:.05em;
      text-transform:uppercase;
    }
    .item {
      display:flex; align-items:center; gap:9px;
      padding:7px 13px;
      font:400 13px/1.2 'Segoe UI',sans-serif;
      color:rgba(255,255,255,.88);
      cursor:default;
      border-radius:0;
      transition:background .08s;
    }
    .item:hover { background:rgba(255,255,255,.1); }
    .ico {
      width:16px; height:16px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      opacity:.75;
    }
    .ico svg { width:15px; height:15px; }
    .sep { height:1px; background:rgba(255,255,255,.09); margin:4px 0; }
    .item.danger { color:#ff6b6b; }
    .item.danger .ico { opacity:.85; }
    .item.danger:hover { background:rgba(255,107,107,.13); }
  </style>
</head>
<body>
<div class="menu">
  <div class="section-label">메모</div>

  <div class="item" id="mi-new">
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">

      <line x1="5" y1="6" x2="9" y2="6"/>
      <line x1="5" y1="8.5" x2="9" y2="8.5"/>
      <line x1="5" y1="11" x2="7" y2="11"/>
      <line x1="12" y1="6" x2="14" y2="6" stroke-width="2"/>
      <line x1="13" y1="5" x2="13" y2="7" stroke-width="2"/>
    </svg></span>
    새 메모
  </div>

  <div class="item" id="mi-list">
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2.5" width="12" height="11" rx="1.5"/>
      <line x1="5" y1="5.5" x2="11" y2="5.5"/>
      <line x1="5" y1="8" x2="11" y2="8"/>
      <line x1="5" y1="10.5" x2="8.5" y2="10.5"/>
    </svg></span>
    메모 목록
  </div>

  <div class="item" id="mi-toggle">
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1.5 8C1.5 8 3.5 4 8 4C12.5 4 14.5 8 14.5 8C14.5 8 12.5 12 8 12C3.5 12 1.5 8 1.5 8Z"/>
      <circle cx="8" cy="8" r="2"/>
    </svg></span>
    숨기기/보이기
  </div>

  <div class="sep"></div>
  <div class="section-label">보관</div>
