<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title></title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { background:transparent; width:170px; overflow:hidden; user-select:none; }
    .menu {
      background:rgba(28,28,30,.97);
      border:1px solid rgba(255,255,255,.1);
      border-radius:11px;
      padding:5px 0;
      width:170px;
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      box-shadow:0 8px 32px rgba(0,0,0,.55);
    }
    .section-label {
      font:500 10px/1 'Segoe UI',sans-serif;
      color:rgba(255,255,255,.3);
      padding:6px 13px 3px;
      letter-spacing:.05em;
      text-transform:uppercase;
    }
    .item {
      display:flex; align-items:center; gap:9px;
      padding:7px 13px;
      font:400 13px/1.2 'Segoe UI',sans-serif;
      color:rgba(255,255,255,.88);
      cursor:default;
      border-radius:0;
      transition:background .08s;
    }
    .item:hover { background:rgba(255,255,255,.1); }
    .ico {
      width:16px; height:16px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      opacity:.75;
    }
    .ico svg { width:15px; height:15px; }
    .sep { height:1px; background:rgba(255,255,255,.09); margin:4px 0; }
    .item.danger { color:#ff6b6b; }
    .item.danger .ico { opacity:.85; }
    .item.danger:hover { background:rgba(255,107,107,.13); }
  </style>
</head>
<body>
<div class="menu">
  <div class="section-label">메모</div>

  <div class="item" id="mi-new">
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2.5" y="2.5" width="9" height="11" rx="1.5"/>
      <line x1="5" y1="6" x2="9" y2="6"/>
      <line x1="5" y1="8.5" x2="9" y2="8.5"/>
      <line x1="5" y1="11" x2="7" y2="11"/>
      <line x1="12" y1="6" x2="14" y2="6" stroke-width="2"/>
      <line x1="13" y1="5" x2="13" y2="7" stroke-width="2"/>
    </svg></span>
    새 메모
  </div>

  <div class="item" id="mi-list">
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2.5" width="12" height="11" rx="1.5"/>
      <line x1="5" y1="5.5" x2="11" y2="5.5"/>
      <line x1="5" y1="8" x2="11" y2="8"/>
      <line x1="5" y1="10.5" x2="8.5" y2="10.5"/>
    </svg></span>
    메모 목록
  </div>

  <div class="item" id="mi-toggle">
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1.5 8C1.5 8 3.5 4 8 4C12.5 4 14.5 8 14.5 8C14.5 8 12.5 12 8 12C3.5 12 1.5 8 1.5 8Z"/>
      <circle cx="8" cy="8" r="2"/>
    </svg></span>
    숨기기/보이기
  </div>

  <div class="sep"></div>
  <div class="section-label">보관</div>

  <div class="item" id="mi-archive">
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="12" height="3" rx="1"/>
      <path d="M3 5v7a1 1 0 001 1h8a1 1 0 001-1V5"/>
      <line x1="6" y1="8" x2="10" y2="8"/>
    </svg></span>
    보관함
  </div>

  <div class="sep"></div>
  <div class="section-label">시스템</div>

  <div class="item" id="mi-settings">
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="8" cy="8" r="2"/>
      <path d="M8 2v1.5M8 12.5V14M2 8h1.5M12.5 8H14M3.5 3.5l1.1 1.1M11.4 11.4l1.1 1.1M12.5 3.5l-1.1 1.1M4.6 11.4l-1.1 1.1"/>
    </svg></span>
    설정
  </div>

  <div class="item" id="mi-translator">
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="8" cy="7" r="4.5"/>
      <path d="M5.5 6.5s.5-1 2.5-1 2.5 1 2.5 1"/>
      <path d="M6 9c.4.8 4 .8 4 0"/>
      <circle cx="6.5" cy="7.5" r=".6" fill="currentColor" stroke="none"/>
      <circle cx="9.5" cy="7.5" r=".6" fill="currentColor" stroke="none"/>
    </svg></span>
    고양이어 번역기
  </div>

  <div class="sep"></div>

  <div class="item danger" id="mi-quit">
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <line x1="4" y1="4" x2="12" y2="12"/>
      <line x1="12" y1="4" x2="4" y2="12"/>
    </svg></span>
    종료
  </div>
</div>
<script type="module">
import { createMemo, invalidateCache } from './store.js';
const invoke = (...a) => window.__TAURI__.core.invoke(...a);
const listen = (...a) => window.__TAURI__.event.listen(...a);
const appWin = window.__TAURI__.window.getCurrentWindow();
async function close() { await appWin.hide(); }

// 다른 창에서 데이터 변경 시 캐시 무효화 (stale 캐시로 삭제 메모 복구 방지)
listen('data-changed', () => invalidateCache());

document.getElementById('mi-new').addEventListener('click', async () => {
  const memo = await createMemo();
  await invoke('create_memo_window', { memoId: memo.id });
  await close();
});
document.getElementById('mi-list').addEventListener('click', async () => {
  await invoke('open_list_window'); await close();
});
document.getElementById('mi-archive').addEventListener('click', async () => {
  await invoke('open_list_window'); await close();
});
document.getElementById('mi-toggle').addEventListener('click', async () => {
  await invoke('toggle_memos'); await close();
});
document.getElementById('mi-settings').addEventListener('click', async () => {
  await invoke('open_settings_window'); await close();
});
document.getElementById('mi-translator').addEventListener('click', async () => {
  await invoke('open_translator_window'); await close();
});
document.getElementById('mi-quit').addEventListener('click', async () => {
  await invoke('quit_app');
});
window.addEventListener('blur', () => close());
</script>
</body>
</html>
