<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>CatMemo</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:220px; height:220px;
      background:transparent;
      overflow:hidden;
      user-select:none; -webkit-user-select:none;
    }
    #cat-wrap { width:220px; height:220px; cursor:pointer; }
    #cat-wrap svg { width:220px; height:220px; display:block; transform-origin:50% 62%; transition:transform 0.45s ease; }
    @keyframes eyeBlink {
      0%, 100% { transform: scaleY(1); }
      30%, 65% { transform: scaleY(0.06); }
    }
    @keyframes eyeYawn {
      0%   { transform: scaleY(1); }
      20%  { transform: scaleY(0.12); }
      65%  { transform: scaleY(0.12); }
      100% { transform: scaleY(1); }
    }
    @keyframes catStretch {
      0%   { transform: scaleY(1)    translateY(0); }
      40%  { transform: scaleY(1.13) translateY(-4%); }
      70%  { transform: scaleY(0.95) translateY(3%); }
      100% { transform: scaleY(1)    translateY(0); }
    }
    @keyframes catBounce {
      0%,100% { transform: translateY(0); }
      30%     { transform: translateY(-6px); }
      60%     { transform: translateY(2px); }
    }
    @keyframes catExcited {
      0%,100% { transform: rotate(0deg); }
      20%     { transform: rotate(-7deg); }
      40%     { transform: rotate(7deg); }
      60%     { transform: rotate(-5deg); }
      80%     { transform: rotate(5deg); }
    }
    .eye-path  { transform-box:fill-box; transform-origin:center; }
    .blinking  { animation: eyeBlink 0.28s ease forwards; }
    .eye-shut  { transform: scaleY(0.06) !important; }
    .yawning   { animation: eyeYawn 2.6s ease forwards; }
    /* ── 쓰다듬기 ─────────────────────────────────────────────── */
    .eye-squint-pet { transform:scaleY(0.38) !important; }
    body { position:relative; }
    #pet-hand {
      position:absolute; left:0; top:0;
      pointer-events:none; z-index:9999; display:none;
    }
    @keyframes furFall {
      0%   { opacity:0.85; transform:translate(0,0) rotate(0deg); }
      100% { opacity:0;    transform:translate(var(--fx),var(--fy)) rotate(var(--fr)); }
    }
    .fur-particle {
      position:absolute; border-radius:50%;
      pointer-events:none;
      animation:furFall 0.85s ease-out forwards;
    }
  </style>
</head>
<body>
<div id="cat-wrap"></div>
<!-- 쓰다듬기 손 (body 직속 — loadCat innerHTML 초기화 영향 없음) -->
<div id="pet-hand">
  <canvas id="pet-canvas" width="64" height="67" style="display:block;"></canvas>
</div>
<script type="module">
import { applyBreed, BREEDS } from './breeds.js';
import { getSettings, invalidateCache } from './store.js';

const invoke = (...a) => window.__TAURI__.core.invoke(...a);
const listen  = (...a) => window.__TAURI__.event.listen(...a);
const appWin  = window.__TAURI__.window.getCurrentWindow();

// ── Eye constants ─────────────────────────────────────────────────────────────
const EL = { x:236, y:357 }, ER = { x:357, y:362 };
const MAX=20, SENS=50, UP_BIAS=4.5;

let svgTpl='', curBreed='orange';
let isMouseDown=false;
let hasDragged=false;
let dragStartX=0, dragStartY=0;
let eventsAttached=false;
let catPos={ x:0, y:0 };
let lastSvgX=300, lastSvgY=300;

// ── 쓰다듬기 상태 ─────────────────────────────────────────────────────────────
let isPetting=false;
let petPauseTimer=null;
let petFurTimer=null;
let petIsMoving=false;
let petMouseSpeed=0;
let petLastMt=0;
const PET_HEAD_X=84, PET_HEAD_Y=62; // 털 생성 기준점 (머리 중앙)

// ── 쓰다듬기 프레임 애니메이션 ────────────────────────────────────────────────
const PET_FRAMES=5;
const petFrameImgs=[];
let petFramesReady=0;
for (let i=0; i<PET_FRAMES; i++) {
  const img=new Image();
  img.onload=()=>petFramesReady++;
  img.src=`./petpet-${i}.png`;
  petFrameImgs.push(img);
}
let petFrame=0, petLastFrameTs=0;

function petFrameInterval() {
  // 속도(px/s) → 인터벌 ms: 빠를수록 짧음 (40~200ms)
  const t=Math.min(petMouseSpeed/400, 1);
  return Math.round(200-t*160);
}

function petDrawFrame() {
  const canvas=document.getElementById('pet-canvas');
  if (!canvas||petFramesReady<PET_FRAMES) return;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,64,67);
  ctx.drawImage(petFrameImgs[petFrame],0,0,64,67);
}

function petAnimLoop(ts) {
  if (isPetting && petFramesReady===PET_FRAMES) {
    if (petIsMoving) {
      const interval=petFrameInterval();
      if (ts-petLastFrameTs>=interval) {
        petFrame=(petFrame+1)%PET_FRAMES;
        petLastFrameTs=ts;
        petDrawFrame();
      }
    }
    // 멈췄을 때: 현재 프레임 그대로 유지
  }
  requestAnimationFrame(petAnimLoop);
}
requestAnimationFrame(petAnimLoop);

// ── Eye movement ──────────────────────────────────────────────────────────────
function eyeOffset(dx, dy) {
  const sdx=dx, sdy=dy<0 ? dy*UP_BIAS : dy;
  const d=Math.sqrt(sdx*sdx+sdy*sdy);
  if (!d) return {x:0,y:0};
  const r=Math.min(d/SENS,1)*MAX/d;
  return {x:sdx*r, y:sdy*r};
}

function moveEyes(svgX, svgY) {
  const wL=document.getElementById('eye-l-wrap');
  const wR=document.getElementById('eye-r-wrap');
  if (!wL||!wR) return;
  const oL=eyeOffset(svgX-EL.x, svgY-EL.y);
  const oR=eyeOffset(svgX-ER.x, svgY-ER.y);
  wL.setAttribute('transform',`translate(${oL.x.toFixed(2)},${oL.y.toFixed(2)})`);
  wR.setAttribute('transform',`translate(${oR.x.toFixed(2)},${oR.y.toFixed(2)})`);
}

function setEyesShut(shut) {
  const eL=document.getElementById('eye-l');
  const eR=document.getElementById('eye-r');
  if (!eL||!eR) return;
  eL.classList.toggle('eye-shut', shut);
  eR.classList.toggle('eye-shut', shut);
}

// ── Global cursor tracking + custom drag ─────────────────────────────────────
async function refreshCatPos() {
  try {
    const p=await appWin.outerPosition();
    catPos={x:p.x, y:p.y};
  } catch(e){}
}

// 눈 추적 — 커스텀 Rust 커맨드로 전역 커서 추적 (권한 불필요)
async function pollCursor() {
  if (isMouseDown) return;
  try {
    const pos=await invoke('get_cursor_pos');
    const dpr=window.devicePixelRatio||1;
    const scale=740/(220*dpr);
    lastSvgX=(pos[0]-catPos.x)*scale;
    lastSvgY=(pos[1]-catPos.y)*scale;
    moveEyes(lastSvgX, lastSvgY);
  } catch(_){ moveEyes(lastSvgX, lastSvgY); }
}

setInterval(pollCursor, 50);
setInterval(refreshCatPos, 600);

// ── Tail animation ────────────────────────────────────────────────────────────
let tailPhase=0, tailLastTs=null;
let tailSpeedTarget=1.0, tailSpeedCurrent=1.0;
const TAIL_OX=546, TAIL_OY=402;

function animateTail(ts) {
  const dt = tailLastTs ? (ts-tailLastTs)/1000 : 0;
  tailLastTs = ts;
  tailSpeedCurrent += (tailSpeedTarget - tailSpeedCurrent) * 0.025;
  tailPhase += dt * tailSpeedCurrent;
  const angle=Math.sin(tailPhase*Math.PI*0.95)*10 + Math.sin(tailPhase*Math.PI*1.85)*4;
  const tw=document.getElementById('tail-wrap');
  if (tw) tw.setAttribute('transform',`rotate(${angle.toFixed(2)} ${TAIL_OX} ${TAIL_OY})`);
  requestAnimationFrame(animateTail);
}

function injectTail(svgEl, breedKey) {
  const old=svgEl.querySelector('#tail-wrap');
  if (old) old.remove();
  const breed=BREEDS[breedKey]||BREEDS.orange;
  const bodyColor=breed.colors['#FEBD92'];

  // ── Step 1: Cut the tail section out of path[0] (the main body path)
  // path[0] starts at M523.391 395.799 and traces the tail first, ending at
  // 568.886 408.651 before continuing with the body. Replace with a straight line.
  const bodyPath=svgEl.querySelector('path');
  if (bodyPath) {
    const d=bodyPath.getAttribute('d');
    // Replace: M523.391 395.799 [all tail curves] 568.886 408.651
    // With:    M523.391 395.799 L568.886 408.651
    const cut=d.replace(
      /M523\.391 395\.799[\s\S]*?568\.886 408\.651/,
      'M523.391 395.799 L568.886 408.651'
    );
    bodyPath.setAttribute('d', cut);
  }

  // ── Step 2: Inject animated tail overlay (exact tail path from original)
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.id='tail-wrap';
  const D=
    'M523.391 395.799 '+
    'C525.234 386.159 527.756 376.634 529.573 366.947 '+
    'C534.834 338.902 538.766 308.676 536.088 280.154 '+
    'C534.954 268.064 531.853 252.31 529.313 240.189 '+
    'C526.011 224.422 520.775 205.412 511.688 191.986 '+
    'C505.151 182.33 495.562 175.992 483.696 173.818 '+
    'C462.507 169.935 424.25 175.435 409.385 156.531 '+
    'C405.237 151.256 404.915 142.864 406.238 136.503 '+
    'C408.705 124.634 413.58 112.791 423.878 105.675 '+
    'C438.735 95.5221 459.288 94.8829 476.469 98.3781 '+
    'C513.194 105.85 548.702 126.509 570.505 157.4 '+
    'C583.509 175.823 585.106 191.08 587.451 212.586 '+
    'C592.871 261.213 591.035 310.375 582.009 358.464 '+
    'C578.367 377.396 574.385 390.455 568.886 408.651 Z';
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',D);
  p.setAttribute('fill',bodyColor);
  g.appendChild(p);
  // Insert right after body path
  if (bodyPath && bodyPath.nextSibling) svgEl.insertBefore(g, bodyPath.nextSibling);
  else svgEl.appendChild(g);
}

// ── Random idle animations ────────────────────────────────────────────────────
function doBlink() {
  const eL=document.getElementById('eye-l'), eR=document.getElementById('eye-r');
  if (!eL||!eR||isMouseDown) return;
  eL.classList.add('blinking'); eR.classList.add('blinking');
  setTimeout(()=>{ eL.classList.remove('blinking'); eR.classList.remove('blinking'); },320);
}

function doLookAround() {
  if (isMouseDown) return;
  const savedX=lastSvgX, savedY=lastSvgY;
  const side=Math.random()>0.5?1:-1;
  const lx=370+side*(350+Math.random()*100), ly=300+(Math.random()-0.5)*120;
  moveEyes(lx, ly);
  setTimeout(()=>moveEyes(savedX, savedY), 900+Math.random()*700);
}

// 머리 기울기: SVG 전체를 좌우로 살짝 회전
function doHeadTilt() {
  if (isMouseDown) return;
  const svgEl=document.querySelector('#cat-wrap svg');
  if (!svgEl) return;
  const angle=(3+Math.random()*6)*(Math.random()>0.5?1:-1);
  svgEl.style.transform=`rotate(${angle}deg)`;
  setTimeout(()=>{ svgEl.style.transform='rotate(0deg)'; }, 1100+Math.random()*900);
}

// 하품: 눈을 천천히 감았다 천천히 뜸
function doYawn() {
  if (isMouseDown) return;
  const eL=document.getElementById('eye-l'), eR=document.getElementById('eye-r');
  if (!eL||!eR||eL.classList.contains('eye-shut')) return;
  eL.classList.remove('blinking'); eR.classList.remove('blinking');
  eL.classList.add('yawning'); eR.classList.add('yawning');
  setTimeout(()=>{ eL.classList.remove('yawning'); eR.classList.remove('yawning'); }, 2700);
}

// 스트레칭: SVG를 세로로 늘렸다 되돌림
function doStretch() {
  if (isMouseDown) return;
  const svgEl=document.querySelector('#cat-wrap svg');
  if (!svgEl) return;
  svgEl.style.animation='catStretch 1.4s ease forwards';
  setTimeout(()=>{ svgEl.style.animation=''; }, 1450);
}

// 통통 점프: 위아래로 작게 튀기
function doBounce() {
  if (isMouseDown) return;
  const svgEl=document.querySelector('#cat-wrap svg');
  if (!svgEl) return;
  svgEl.style.animation='catBounce 0.55s ease';
  setTimeout(()=>{ svgEl.style.animation=''; }, 600);
}

// 귀 씰룩 (빠른 미세 기울기)
function doEarFlick() {
  if (isMouseDown) return;
  const svgEl=document.querySelector('#cat-wrap svg');
  if (!svgEl) return;
  const side = Math.random()>0.5 ? 1 : -1;
  svgEl.style.transition='transform 0.08s ease';
  svgEl.style.transform=`rotate(${side*4}deg)`;
  setTimeout(()=>{
    svgEl.style.transform=`rotate(${-side*2}deg)`;
    setTimeout(()=>{ svgEl.style.transform=''; svgEl.style.transition='transform 0.45s ease'; }, 100);
  }, 90);
}

// 흥분 떨기: 나비 등장 시
function doExcited() {
  const svgEl=document.querySelector('#cat-wrap svg');
  if (!svgEl) return;
  svgEl.style.animation='catExcited 0.5s ease';
  setTimeout(()=>{ svgEl.style.animation=''; }, 520);
}

(function schedBlink(){
  setTimeout(()=>{ doBlink(); schedBlink(); }, 3500+Math.random()*4000);
})();
(function schedLook(){
  setTimeout(()=>{ doLookAround(); schedLook(); }, 9000+Math.random()*12000);
})();
(function schedTilt(){
  setTimeout(()=>{ doHeadTilt(); schedTilt(); }, 12000+Math.random()*14000);
})();
(function schedYawn(){
  setTimeout(()=>{ doYawn(); schedYawn(); }, 22000+Math.random()*20000);
})();
(function schedStretch(){
  setTimeout(()=>{ doStretch(); schedStretch(); }, 18000+Math.random()*20000);
})();
(function schedBounce(){
  setTimeout(()=>{ doBounce(); schedBounce(); }, 14000+Math.random()*18000);
})();
(function schedEarFlick(){
  setTimeout(()=>{ doEarFlick(); schedEarFlick(); }, 5000+Math.random()*8000);
})();

// ── 쓰다듬기 helpers ──────────────────────────────────────────────────────────
// 고양이 머리 타원 (220×220 창 기준: 중심 90,80 / rx 60 / ry 56)
function isInHeadZone(cx, cy) {
  const dx=cx-90, dy=cy-80;
  return (dx*dx)/(60*60)+(dy*dy)/(56*56) <= 1;
}

function setEyesSquint(on) {
  const eL=document.getElementById('eye-l'), eR=document.getElementById('eye-r');
  if (eL) eL.classList.toggle('eye-squint-pet', on);
  if (eR) eR.classList.toggle('eye-squint-pet', on);
}

// 품종 색상 → 털 입자 색상 배열 (밝기 단계별 파생)
function hexToRgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function rgbToHex(r,g,b){ return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join(''); }
function getFurColors() {
  const base=(BREEDS[curBreed]||BREEDS.orange).colors['#FEBD92'];
  const [r,g,b]=hexToRgb(base);
  return [
    base,                          // 베이스
    rgbToHex(r+28,g+24,b+18),     // 밝게
    rgbToHex(r+52,g+46,b+36),     // 더 밝게 (거의 흰 털)
    rgbToHex(r-18,g-16,b-12),     // 살짝 어둡게
    rgbToHex(r+14,g+12,b+8),      // 미세 변화
  ];
}

function spawnFur(cx, cy) {
  if (document.querySelectorAll('.fur-particle').length > 40) return;
  const colors=getFurColors();
  const count=1+Math.floor(Math.random()*5); // 1~5개 랜덤
  for (let i=0; i<count; i++) {
    const p=document.createElement('div');
    p.className='fur-particle';
    const angle=Math.random()*Math.PI*2;
    const dist=14+Math.random()*30;
    const fx=(Math.cos(angle)*dist).toFixed(1)+'px';
    const fy=(Math.sin(angle)*dist+8+Math.random()*12).toFixed(1)+'px';
    const fr=(Math.random()*360).toFixed(0)+'deg';
    const w=(2.5+Math.random()*4).toFixed(1);
    const h=(Number(w)*(0.30+Math.random()*0.40)).toFixed(1);
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${w}px;height:${h}px;`+
      `background:${colors[Math.floor(Math.random()*colors.length)]};`+
      `--fx:${fx};--fy:${fy};--fr:${fr};`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 900);
  }
}

function startPetting() {
  isPetting=true;
  petFrame=0; petLastFrameTs=0;
  petIsMoving=false; petMouseSpeed=0; petLastMt=0;
  document.getElementById('cat-wrap').style.cursor='none';
  const hand=document.getElementById('pet-hand');
  if (hand) { hand.style.left='52px'; hand.style.top='52px'; hand.style.display='block'; }
  petDrawFrame();
  // 커서 위치 잠금 (움직임만 감지, 커서는 제자리)
  document.body.requestPointerLock?.().catch?.(()=>{});
  // 털 폴링 시작 (마우스 이동 여부와 무관하게 주기적으로 생성)
  clearInterval(petFurTimer);
  petFurTimer=setInterval(()=>{ if (isPetting) spawnFur(PET_HEAD_X, PET_HEAD_Y); }, 130);
  setEyesSquint(true);
}

function stopPetting() {
  isPetting=false;
  petIsMoving=false; petMouseSpeed=0;
  clearTimeout(petPauseTimer);
  clearInterval(petFurTimer); petFurTimer=null;
  if (document.pointerLockElement) document.exitPointerLock?.();
  document.getElementById('cat-wrap').style.cursor='';
  const hand=document.getElementById('pet-hand');
  if (hand) hand.style.display='none';
  const canvas=document.getElementById('pet-canvas');
  if (canvas) { const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,64,67); }
  setEyesSquint(false);
}

// ── Load cat SVG ──────────────────────────────────────────────────────────────
async function loadCat(breed) {
  if (!svgTpl) svgTpl=await fetch('./cat.svg').then(r=>r.text());
  curBreed=breed||curBreed;
  let svg=applyBreed(svgTpl, curBreed);
  svg=svg.replace(/<path id="eye-l"/, '<g id="eye-l-wrap"><path id="eye-l" class="eye-path"');
  svg=svg.replace(/(<path id="eye-l" class="eye-path"[^>]*\/>)/, '$1</g>');
  svg=svg.replace(/<path id="eye-r"/, '<g id="eye-r-wrap"><path id="eye-r" class="eye-path"');
  svg=svg.replace(/(<path id="eye-r" class="eye-path"[^>]*\/>)/, '$1</g>');
  document.getElementById('cat-wrap').innerHTML=svg;
  const svgEl=document.querySelector('#cat-wrap svg');
  injectTail(svgEl, curBreed);
  attachEvents(svgEl);
  tailLastTs=null;
  requestAnimationFrame(animateTail);
}

// ── Mouth open animation ──────────────────────────────────────────────────────
// Stretch the existing mouth paths horizontally + slightly vertically
// (same color as original, so it blends naturally)
function setMouthOpen(open) {
  const svgEl=document.querySelector('#cat-wrap svg');
  if (!svgEl) return;
  const ma=svgEl.querySelector('#cat-mouth-a');
  const mb=svgEl.querySelector('#cat-mouth-b');
  if (open) {
    // Scale mouth-a: 2x wide, 1.6x tall, anchored at its center (291, 388)
    if (ma) ma.setAttribute('transform','translate(291 388) scale(2 1.6) translate(-291 -388)');
    if (mb) mb.style.display='none'; // hide the small detail path while stretched
  } else {
    if (ma) ma.removeAttribute('transform');
    if (mb) mb.style.display='';
  }
}

// ── Events ────────────────────────────────────────────────────────────────────
function attachEvents(svgEl) {
  if (eventsAttached) return;
  eventsAttached=true;

  const openEyes=()=>{
    if (isPetting) stopPetting();
    isMouseDown=false; hasDragged=false;
    setEyesShut(false);
    pollCursor(); // 드래그 후 즉시 눈 추적 재개
    invoke('clamp_cat_window').then(refreshCatPos).catch(()=>{});
  };
  document.addEventListener('mouseup',   e=>{ if(e.button===0) openEyes(); });
  window.addEventListener('pointerup',   openEyes);
  // 드래그 중 재진입 시에만 openEyes (쓰다듬기 중엔 무시)
  svgEl.addEventListener('mouseenter', ()=>{ if(isMouseDown && !isPetting) openEyes(); });

  svgEl.addEventListener('mousedown', e=>{
    if (e.button!==0) return;
    isMouseDown=true; hasDragged=false;
    if (isInHeadZone(e.clientX, e.clientY)) {
      // 머리 영역 → 쓰다듬기 모드 (창 드래그 없음)
      startPetting();
    } else {
      // 그 외 영역 → 창 드래그 모드
      dragStartX=e.clientX; dragStartY=e.clientY;
    }
  });

  document.addEventListener('mousemove', e=>{
    if (isPetting) {
      // Pointer Lock 모드: movementX/Y로 이동량만 받음 (커서 위치 고정)
      const mx=e.movementX||0, my=e.movementY||0;
      const nowMs=performance.now();
      const dt=nowMs-petLastMt;
      if (dt>0 && (Math.abs(mx)>0.3||Math.abs(my)>0.3)) {
        petMouseSpeed=Math.sqrt(mx*mx+my*my)/(dt/1000);
        petIsMoving=true;
        clearTimeout(petPauseTimer);
        petPauseTimer=setTimeout(()=>{ petIsMoving=false; petMouseSpeed=0; }, 150);
      }
      petLastMt=nowMs;
      return;
    }
    if (!isMouseDown||hasDragged) return;
    if (Math.abs(e.clientX-dragStartX)>4||Math.abs(e.clientY-dragStartY)>4) {
      hasDragged=true;
      appWin.startDragging().catch(()=>{});
    }
  });

  // 우클릭 → 컨텍스트 메뉴
  svgEl.addEventListener('contextmenu', async e=>{
    e.preventDefault();
    const dpr=window.devicePixelRatio||1;
    await invoke('show_cat_menu', {
      x: Math.round(e.screenX*dpr),
      y: Math.round(e.screenY*dpr)
    });
  });

  // SVG 위 마우스 이동 → 눈 즉시 추적
  svgEl.addEventListener('mousemove', e=>{
    if (isMouseDown) return;
    const rect=svgEl.getBoundingClientRect();
    lastSvgX=(e.clientX-rect.left)*(740/220);
    lastSvgY=(e.clientY-rect.top)*(740/220);
    moveEyes(lastSvgX, lastSvgY);
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
await listen('breed-changed', e=>{ eventsAttached=false; loadCat(e.payload.breed); });
await listen('data-changed',  ()=>invalidateCache());

await refreshCatPos();
const s=await getSettings();
await loadCat(s.breed);
</script>
