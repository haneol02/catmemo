<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>메모 목록</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:360px; height:520px;
      background:transparent;
      overflow:hidden;
      font-family:'Segoe UI',system-ui,sans-serif;
    }
    .panel {
      width:100%; height:100%;
      background:rgba(255,255,255,.97);
      border-radius:14px;
      box-shadow:0 8px 32px rgba(0,0,0,.18);
      display:flex; flex-direction:column;
      overflow:hidden;
    }
    /* ── header ──────────────────────────── */
    .header {
      display:flex; align-items:center; gap:8px;
      padding:0 12px; height:50px;
      background:#fff;
      border-bottom:1px solid #f0f0f0;
      cursor:default; flex-shrink:0;
    }
    .header-icon { color:#666; flex-shrink:0; }
    .header h2 { font:600 14px/1 inherit; color:#1a1a1a; flex:1; }
    .header-btn {
      width:28px; height:28px; border:none; background:transparent;
      border-radius:8px; cursor:pointer; color:#888;
      display:flex; align-items:center; justify-content:center;
      transition:background .15s, color .15s; flex-shrink:0;
    }
    .header-btn:hover { background:#f5f5f5; color:#333; }
    /* ── tabs ────────────────────────────── */
    .tabs {
      display:flex; border-bottom:1px solid #f0f0f0; flex-shrink:0;
      padding:0 4px;
    }
    .tab {
      flex:1; padding:10px 8px; font:500 12px/1 inherit; color:#999;
      border:none; background:transparent; cursor:pointer;
      border-bottom:2px solid transparent; margin-bottom:-1px;
      transition:color .15s, border-color .15s;
      display:flex; align-items:center; justify-content:center; gap:5px;
    }
    .tab.active { color:#1a1a1a; border-color:#f59e0b; }
    .tab:hover:not(.active) { color:#555; }
    .tab-cnt {
      font:500 11px/1 inherit; color:#fff; background:#d0d0d0;
      border-radius:10px; padding:1px 5px; min-width:16px; text-align:center;
    }
    .tab.active .tab-cnt { background:#f59e0b; }
    /* ── list ────────────────────────────── */
    .list { flex:1; overflow-y:auto; padding:6px; }
    .list::-webkit-scrollbar { width:4px; }
    .list::-webkit-scrollbar-thumb { background:#e0e0e0; border-radius:2px; }
    /* ── section label (archive) ─────────── */
    .section-label {
      font:600 10px/1 inherit; color:#aaa; letter-spacing:.06em;
      text-transform:uppercase; padding:8px 8px 4px;
    }
    /* ── memo item ───────────────────────── */
    .memo-item {
      display:flex; align-items:center; gap:10px;
      padding:9px 10px 9px 0; margin-bottom:3px;
      border-radius:10px; cursor:pointer;
      transition:background .12s; position:relative;
      overflow:hidden;
    }
    .memo-item:hover { background:rgba(0,0,0,.04); }
    /* color strip */
    .memo-strip {
      width:4px; height:36px; border-radius:0 3px 3px 0; flex-shrink:0;
    }
    .memo-info { flex:1; min-width:0; }
    .memo-title {
      font:600 13px/1.25 inherit; color:#1a1a1a;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .memo-preview {
      font:400 11px/1.4 inherit; color:#999; margin-top:2px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    /* badges */
    .memo-badges { display:flex; gap:3px; align-items:center; flex-shrink:0; }
    .badge {
      display:flex; align-items:center; justify-content:center;
      width:18px; height:18px; border-radius:5px;
    }
    .badge.pin   { background:#fef3c7; color:#d97706; }
    .badge.lock  { background:#ede9fe; color:#7c3aed; }
    /* action buttons */
    .memo-actions { display:flex; gap:2px; flex-shrink:0; margin-right:2px; }
    .act-btn {
      width:26px; height:26px; border:none; background:transparent;
      border-radius:7px; cursor:pointer; color:#c0c0c0;
      display:flex; align-items:center; justify-content:center;
      transition:background .12s, color .12s;
      opacity:0; pointer-events:none;
    }
    .memo-item:hover .act-btn { opacity:1; pointer-events:all; }
    .act-btn:hover { background:rgba(0,0,0,.08); color:#555; }
    .act-btn.danger:hover { background:rgba(220,38,38,.1); color:#dc2626; }
    /* ── select mode ────────────────────── */
    .sel-bar {
      display:none; align-items:center; gap:8px;
      padding:7px 10px; background:#fff3cd;
      border-bottom:1px solid #fde68a; flex-shrink:0;
    }
    .sel-bar.on { display:flex; }
    .sel-cnt { font:600 12px/1 inherit; color:#92400e; flex:1; }
    .sel-del-btn {
      padding:6px 12px; border:none; border-radius:8px;
      background:#ef4444; color:#fff; font:600 12px/1 inherit;
      cursor:pointer; transition:background .12s;
      display:flex; align-items:center; gap:5px;
    }
    .sel-del-btn:hover { background:#dc2626; }
    .sel-del-btn:disabled { background:#ccc; cursor:default; }
    .sel-cancel-btn {
      padding:6px 10px; border:none; border-radius:8px;
      background:transparent; color:#666; font:500 12px/1 inherit;
      cursor:pointer;
    }
    .sel-cancel-btn:hover { background:rgba(0,0,0,.06); }
    /* checkbox */
    .memo-check {
      width:18px; height:18px; flex-shrink:0; margin-left:8px;
      accent-color:#f59e0b; cursor:pointer;
      display:none;
    }
    .select-mode .memo-check { display:block; }
    .select-mode .memo-item { cursor:default; }
    .select-mode .act-btn { display:none !important; }
    .memo-item.selected { background:rgba(245,158,11,.12); }
    /* select toggle btn in header */
    .header-btn.select-active { background:#fef3c7; color:#d97706; }
    /* ── empty state ─────────────────────── */
    .empty {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:48px 24px; color:#c8c8c8; gap:10px;
    }
    .empty svg { opacity:.5; }
    .empty p { font:400 13px/1.6 inherit; text-align:center; color:#bbb; }
    /* ── footer ──────────────────────────── */
    .footer { padding:8px 10px; border-top:1px solid #f0f0f0; flex-shrink:0; }
    .new-btn {
      width:100%; padding:10px; border:none; border-radius:10px;
      background:#fbbf24; color:#333; font:600 13px/1 inherit;
      cursor:pointer; transition:background .15s;
      display:flex; align-items:center; justify-content:center; gap:6px;
    }
    .new-btn:hover { background:#f59e0b; }
    /* ── confirm modal ───────────────────── */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.45);
      display:flex; align-items:center; justify-content:center;
      z-index:100; opacity:0; pointer-events:none;
      transition:opacity .15s;
    }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal-box {
      background:#fff; border-radius:14px;
      padding:24px 22px 18px; width:240px;
      box-shadow:0 8px 32px rgba(0,0,0,.2);
      transform:scale(.92); transition:transform .15s;
    }
    .modal-overlay.open .modal-box { transform:scale(1); }
    .modal-title { font:700 14px/1 inherit; color:#1a1a1a; margin-bottom:7px; }
    .modal-sub   { font:400 12px/1.5 inherit; color:#888; }
    .modal-btns  { display:flex; gap:8px; margin-top:18px; }
    .modal-cancel {
      flex:1; padding:9px; border:1px solid #e0e0e0; border-radius:9px;
      background:#fff; font:500 12px/1 inherit; color:#555; cursor:pointer;
      transition:background .12s;
    }
    .modal-cancel:hover { background:#f8f8f8; }
    .modal-delete {
      flex:1; padding:9px; border:none; border-radius:9px;
      background:#ef4444; font:600 12px/1 inherit; color:#fff; cursor:pointer;
      transition:background .12s;
    }
    .modal-delete:hover { background:#dc2626; }
  </style>
</head>

  <div class="list" id="list-area"></div>
